"en": { label: "English", html: `
<h1>Privacy Policy</h1>
<p class="meta">Word Review · Capybara Around The World<br>Effective date: June 21, 2026</p>
<p>Word Review is a vocabulary learning app that helps you capture and review words and phrases you encounter in daily life. Your privacy matters to us. This policy explains what data we collect, how we use it, and what choices you have.</p>
<hr>
<h2>1. What data we collect</h2>
<p><strong>Vocabulary content you add.</strong> Words, phrases, notes, and images you enter are stored locally on your device. They are only sent to our servers when you explicitly request AI-powered enrichment (examples, pronunciation tips, translations).</p>
<p><strong>App preferences and settings.</strong> Your language preferences, theme, review streak, and settings are stored locally using standard iOS storage (NSUserDefaults / Keychain). They never leave your device.</p>
<p><strong>In-app purchase status.</strong> If you subscribe or purchase, Apple processes the transaction. We receive only confirmation of entitlement status — no payment details, card numbers, or billing information.</p>
<p><strong>We do not collect</strong> your name, email, location, contacts, browsing history, or any device identifiers for tracking.</p>
<p><strong>Usage counter (AI features).</strong> If you use AI features, we store a random, app-generated identifier and a monthly count of your AI requests, so we can enforce plan limits and prevent abuse. This identifier is not linked to your name, email, or any personal information, and is never used for advertising or tracking. The count resets each month.</p>
<hr>
<h2>2. How we use your data</h2>
<p>When you request AI enrichment, the word or phrase is sent to our secure backend (a Supabase Edge Function) solely to generate example sentences, pronunciation notes, and contextual tips in your chosen language. We do not store your vocabulary on our servers, log request content beyond what is needed for error diagnosis, or use your vocabulary to train any model.</p>
<p>We do not sell, rent, or share your data with advertisers or data brokers.</p>
<hr>
<h2>3. Third-party services</h2>
<p><strong>Google Gemini API</strong> — Generates vocabulary enrichment. Requests are proxied through our backend; subject to <a href="${L.gemini}" target="_blank">Google's API Terms</a>.</p>
<p><strong>Google Cloud Text-to-Speech</strong> — Pronounces vocabulary aloud; audio is cached locally after the first request. Subject to <a href="${L.gcloud}" target="_blank">Google Cloud Terms</a>.</p>
<p><strong>Apple In-App Purchase / StoreKit</strong> — Handles all payment processing. We never see your payment details. Subject to <a href="${L.apple}" target="_blank">Apple's standard EULA</a>.</p>
<p><strong>Supabase</strong> — Hosts our backend proxy. Requests are not logged or stored beyond transient processing. Subject to <a href="${L.supabase}" target="_blank">Supabase's Privacy Policy</a>. It also stores an anonymous usage counter (a random identifier and a monthly request count) used only to enforce plan limits.</p>
<hr>
<h2>4. Data storage and security</h2>
<p>All vocabulary, settings, and review history are stored locally on your device. Sensitive data such as your own API keys (Bring Your Own Key) are stored in the iOS Keychain, encrypted by the operating system.</p>
<p>We do not operate user accounts or a database of your personal vocabulary. Deleting the app permanently removes all locally stored data.</p>
<hr>
<h2>5. Children's privacy</h2>
<p>Word Review is not directed at children under 13. We do not knowingly collect personal information from children. If you believe a child has provided us with personal information, please contact us so we can delete it.</p>
<hr>
<h2>6. Your rights and choices</h2>
<p><strong>Delete your data.</strong> You can delete individual items or entire language profiles in the app at any time. Deleting the app removes all local data permanently.</p>
<p><strong>Export your data.</strong> The app includes a full export feature (JSON and CSV).</p>
<p><strong>Opt out of AI features.</strong> All AI enrichment is opt-in and requires internet. You can use the app entirely offline for review with no data leaving your device.</p>
<hr>
<h2>7. Changes to this policy</h2>
<p>We may update this policy from time to time. If we make material changes, we will update the effective date above. Continued use after changes are posted constitutes acceptance.</p>
<hr>
<h2>8. Contact</h2>
<p>Questions? Reach us at <a href="mailto:${L.email}">${L.email}</a></p>
`},

<p>Word Review 不面向 13 岁以下儿童。我们不会有意收集儿童的个人信息。如果你认为某位儿童向我们提供了个人信息，请联系我们以便删除。</p>

<p><strong>导出你的数据。</strong>应用提供完整的导出功能（JSON 和 CSV）。</p>
<p><strong>选择不使用 AI 功能。</strong>所有 AI 增强均为可选并需要联网。你可以完全离线使用应用进行复习，不会有任何数据离开你的设备。</p>

<p>我们可能会不时更新本政策。如有重大变更，我们会更新上方的生效日期。变更发布后继续使用即表示接受。</p>

"es": { label: "Español", html: `

<p>Word Review es una app de aprendizaje de vocabulario que te ayuda a guardar y repasar palabras y frases que encuentras a diario. Tu privacidad nos importa. Esta política explica qué datos recopilamos, cómo los usamos y qué opciones tienes.</p>

<hr>

<p>Todo el vocabulario, los ajustes y el historial de repaso se guardan localmente en tu dispositivo. Los datos sensibles, como tus propias claves de API (Trae tu propia clave), se guardan en el Keychain de iOS, cifrado por el sistema operativo.</p>

<h1>Polityka prywatności</h1>
<p class="meta">Word Review · Capybara Around The World<br>Data wejścia w życie: 21 czerwca 2026</p>
<p>Word Review to aplikacja do nauki słownictwa, która pomaga zapisywać i powtarzać słowa oraz zwroty napotkane w codziennym życiu. Twoja prywatność jest dla nas ważna. Ta polityka wyjaśnia, jakie dane zbieramy, jak je wykorzystujemy i jakie masz możliwości wyboru.</p>
<hr>
<h2>1. Jakie dane zbieramy</h2>
<p><strong>Słownictwo, które dodajesz.</strong> Słowa, zwroty, notatki i obrazy, które wprowadzasz, są przechowywane lokalnie na Twoim urządzeniu. Są wysyłane na nasze serwery tylko wtedy, gdy wyraźnie poprosisz o wzbogacenie przez AI (przykłady, wskazówki wymowy, tłumaczenia).</p>

<p><strong>Nie zbieramy</strong> Twojego imienia, e-maila, lokalizacji, kontaktów, historii przeglądania ani identyfikatorów urządzenia do śledzenia.</p>
<p><strong>Licznik użycia (funkcje AI).</strong> Jeśli korzystasz z funkcji AI, przechowujemy losowy identyfikator wygenerowany przez aplikację oraz miesięczną liczbę Twoich żądań AI, aby egzekwować limity planu i zapobiegać nadużyciom. Ten identyfikator nie jest powiązany z Twoim imieniem, adresem e-mail ani żadnymi danymi osobowymi i nigdy nie jest używany do reklam ani śledzenia. Licznik jest zerowany co miesiąc.</p>
<hr>
<h2>2. Jak wykorzystujemy Twoje dane</h2>
<p>Gdy prosisz o wzbogacenie przez AI, słowo lub zwrot jest wysyłany do naszego bezpiecznego zaplecza (Supabase Edge Function) wyłącznie w celu wygenerowania przykładowych zdań, notatek o wymowie i wskazówek kontekstowych w wybranym języku. Nie przechowujemy Twojego słownictwa na serwerach, nie rejestrujemy treści ponad to, co potrzebne do diagnozy błędów, ani nie wykorzystujemy Twojego słownictwa do trenowania żadnego modelu.</p>
<p>Nie sprzedajemy, nie wynajmujemy ani nie udostępniamy Twoich danych reklamodawcom ani brokerom danych.</p>

<h2>3. Usługi stron trzecich</h2>

<p><strong>Google Cloud Text-to-Speech</strong> — Wymawia słownictwo; dźwięk jest buforowany lokalnie po pierwszym żądaniu. Podlega <a href="${L.gcloud}" target="_blank">Warunkom Google Cloud</a>.</p>

<p><strong>Supabase</strong> — Hostuje nasze zaplecze proxy. Żądania nie są rejestrowane ani przechowywane poza chwilowym przetwarzaniem. Podlega <a href="${L.supabase}" target="_blank">Polityce prywatności Supabase</a>. Przechowywany jest tam również anonimowy licznik użycia (losowy identyfikator i miesięczna liczba żądań), wykorzystywany wyłącznie do egzekwowania limitów planu.</p>

// ── Map app language codes → available page languages ───────────────────────
function resolveLang(code) {
  if (!code) return 'en';
  if (POLICIES[code]) return code;            // exact (e.g. zh-Hant, pt-BR)
  if (code.indexOf('es') === 0) return 'es';  // es-419, es-ES
  if (code.indexOf('pt') === 0) return 'pt-BR';
  var base = code.split('-')[0];
  if (POLICIES[base]) return base;            // ja, ko, fr, de, ...
  return 'en';                                 // unsupported → English
}

function render(lang) {
  var p = POLICIES[lang] || POLICIES['en'];
  document.getElementById('content').innerHTML = p.html;
  document.documentElement.lang = lang;
  document.body.setAttribute('dir', p.dir === 'rtl' ? 'rtl' : 'ltr');
  var sel = document.getElementById('langsel');
  if (sel) sel.value = lang;
  try { localStorage.setItem('wr_lang', lang); } catch (e) {}
}

// Build language dropdown
(function () {
  var bar = document.getElementById('langbar');
  var sel = document.createElement('select');
  sel.id = 'langsel';
  sel.setAttribute('aria-label', 'Choose language');
  Object.keys(POLICIES).forEach(function (code) {
    var o = document.createElement('option');
    o.value = code;
    o.textContent = POLICIES[code].label;
    sel.appendChild(o);
  });
  sel.addEventListener('change', function () { render(sel.value); });
  bar.appendChild(sel);
  // Initial language: ?lang= param → shared saved choice → browser → English
  var params = new URLSearchParams(window.location.search);
  var initial = resolveLang(params.get('lang'));
  if (!params.get('lang')) {
    try {
      var saved = localStorage.getItem('wr_lang') || localStorage.getItem('wr_pp_lang');
      if (saved && POLICIES[saved]) initial = saved;
      else initial = resolveLang((navigator.language || 'en'));
    } catch (e) {}
  }
  render(initial);
})();
</script>
